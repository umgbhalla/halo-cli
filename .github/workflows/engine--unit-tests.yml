name: "[Engine] Unit Tests"

on:
  pull_request:
    branches: [main]
    paths:
      - "engine/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Taskfile.yml"
      - "pyrightconfig.json"
      - ".github/workflows/engine--unit-tests.yml"
  push:
    branches: [main]
    paths:
      - "engine/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Taskfile.yml"
      - "pyrightconfig.json"
      - ".github/workflows/engine--unit-tests.yml"
  workflow_call:

env:
  PYTHON_VERSION: "3.10"

permissions:
  checks: write
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: depot-ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install engine dependencies
        run: task ci:setup

      - name: Unit tests (pytest)
        run: task test:unit

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: "test-results/unit.xml"
          update_check: true
          detailed_summary: true
          include_passed: true
          include_time_in_summary: true
          fail_on_failure: true
